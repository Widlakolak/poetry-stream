name: Build Push and Deploy

on:
  push:
    branches: [ main ]

jobs:

  docker:

    runs-on: ubuntu-latest

    steps:

      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Login to GitHub Container Registry
        run: echo ${{ secrets.GHCR_TOKEN }} | docker login ghcr.io -u ${{ github.repository_owner }} --password-stdin

      - name: Build backend image
        run: |
          docker build -t ghcr.io/${{ github.repository_owner }}/poetrystream-backend:latest ./backend

      - name: Push backend image
        run: |
          docker push ghcr.io/${{ github.repository_owner }}/poetrystream-backend:latest

      - name: Build frontend image
        run: |
          docker build -t ghcr.io/${{ github.repository_owner }}/poetrystream-frontend:latest ./frontend

      - name: Push frontend image
        run: |
          docker push ghcr.io/${{ github.repository_owner }}/poetrystream-frontend:latest

  deploy:

    needs: docker
    runs-on: ubuntu-latest

    steps:

      - name: Deploy to QNAP
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.QNAP_HOST }}
          username: ${{ secrets.QNAP_USER }}
          password: ${{ secrets.QNAP_PASSWORD }}
          script: |
            cd /share/CACHEDEV1_DATA/Container/poetrystream
            docker compose pull
            docker compose up -d