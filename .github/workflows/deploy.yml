name: Build & Push Images

on:
  push:
    branches: [ "main" ]

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    
    environment:
      name: production
      url: https://poetrystream.qzz.io


    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Login to GHCR
        run: echo "${{ secrets.GHCR_TOKEN }}" | docker login ghcr.io -u ${{ github.actor }} --password-stdin

      - name: Build & push backend
        run: |
          IMAGE_NAME=$(echo "ghcr.io/${{ github.repository }}/backend:latest" | tr '[:upper:]' '[:lower:]')
          docker build -t $IMAGE_NAME ./backend
          docker push $IMAGE_NAME

      - name: Build & push frontend
        run: |
          IMAGE_NAME=$(echo "ghcr.io/${{ github.repository }}/frontend:latest" | tr '[:upper:]' '[:lower:]')
          docker build -t $IMAGE_NAME ./frontend
          docker push $IMAGE_NAME