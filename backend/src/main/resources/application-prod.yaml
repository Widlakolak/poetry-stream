frontend:
  url: https://poetrystream.qzz.io

spring:
  application:
    name: poetrystream-backend

  datasource:
    url: jdbc:postgresql://${DB_HOST:localhost}:${DB_PORT:5432}/${DB_NAME:poetrystream}
    username: ${DB_USERNAME:poetry}
    password: ${DB_PASSWORD:poetrypassword}
    driver-class-name: org.postgresql.Driver

  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: false
    properties:
      hibernate:
        highlight_sql: true
    defer-datasource-initialization: false
    open-in-view: false

  flyway:
    enabled: true
    baseline-on-migrate: true
    locations: classpath:db/migration

  h2:
    console:
      enabled: false

server:
  address: 0.0.0.0
  port: 8080
  forward-headers-strategy: framework

management:
  endpoints:
    web:
      exposure:
        include: health,info
  endpoint:
    health:
      show-details: always

springdoc:
  packages-to-scan: com.poetrystream
  swagger-ui:
    config-url: /v3/api-docs/swagger-config
    disable-swagger-default-url: true
  api-docs:
    enabled: true
    path: /v3/api-docs
  show-actuator: true

logging:
  level:
    root: INFO