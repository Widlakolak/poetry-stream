name: poetrystream

services:
  postgres:
    image: postgres:17-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: poetrystream
      POSTGRES_USER: poetry
      POSTGRES_PASSWORD: poetrypassword
    volumes:
      - /share/CACHEDEV1_DATA/Container/poetrystream/postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U poetry -d poetrystream"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - poetry-net

  backend:
    build:
      context: /share/CACHEDEV1_DATA/Container/poetrystream/backend
      dockerfile: Dockerfile
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      SPRING_PROFILES_ACTIVE: prod
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/poetrystream
      SPRING_DATASOURCE_USERNAME: poetry
      SPRING_DATASOURCE_PASSWORD: poetrypassword
      SERVER_PORT: 8080
    ports:
      - "8081:8080"
    networks:
      - poetry-net

  frontend:
    build:
      context: /share/CACHEDEV1_DATA/Container/poetrystream/frontend
      dockerfile: Dockerfile
    restart: unless-stopped
    depends_on:
      - backend
    networks:
      - poetry-net

  cloudflare:
    image: cloudflare/cloudflared:latest
    restart: unless-stopped
    command: tunnel --no-autoupdate run --token eyJhIjoiYWM5YWQxZWQ2NGI2ZjdkYmJkODE0MWQ1MzU0NzQwYWQiLCJ0IjoiZjI0NzczOTctMzMyZS00MWIwLTg1MWEtNWJhZjYzZmFkYTEyIiwicyI6IlkyVmhNMll4TUdFdE1XRTBPQzAwWlRnekxUZ3habVl0T1dVNU1XRTVObU16TlRVMiJ9 --protocol http2
    depends_on:
      - frontend
    networks:
      - poetry-net

networks:
  poetry-net:
    driver: bridge