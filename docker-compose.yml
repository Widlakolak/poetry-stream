services:
  postgres:
    image: postgres:17-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: poetrystream
      POSTGRES_USER: poetry
      POSTGRES_PASSWORD: poetrypassword
    volumes:
      - /share/CACHEDEV1_DATA/Container/poetrystream/postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U poetry -d poetrystream"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - poetry-net

  backend:
    image: ghcr.io/widlakolak/poetry-stream/backend:latest
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      SPRING_PROFILES_ACTIVE: prod
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/poetrystream
      SPRING_DATASOURCE_USERNAME: poetry
      SPRING_DATASOURCE_PASSWORD: poetrypassword
      SERVER_PORT: 8080
    ports:
      - "8081:8080"
    networks:
      - poetry-net

  frontend:
    image: ghcr.io/widlakolak/poetry-stream/frontend:latest
    restart: unless-stopped
    depends_on:
      - backend
    networks:
      - poetry-net

  cloudflare:
    image: cloudflare/cloudflared:latest
    restart: unless-stopped
    command: tunnel --no-autoupdate run --protocol http2
    environment:
        TUNNEL_TOKEN: ${CLOUDFLARE_TUNNEL_TOKEN}
    depends_on:
      - frontend
    networks:
      - poetry-net

networks:
  poetry-net:
    driver: bridge